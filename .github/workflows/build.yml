name: 🚀 Build ImmortalWrt (R2S)

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-23.05
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 1. 环境清理与准备
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev swig libpython3-dev wget
          sudo timedatectl set-timezone "$TZ"
          # 必须清理空间，否则 1GB 的 RootFS 无法打包成功
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost

      - name: 2. 克隆源码 (仅核心)
        run: git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt

      - name: 3. 物理注入插件 (校准 404 与认证路径)
        run: |
          cd openwrt
          ./scripts/feeds update -a
          
          # 预创建目录，确保解压路径可控
          mkdir -p package/downloads
          
          # Passwall 核心 (使用 main 分支，修复 404)
          wget -O package/downloads/pw.zip https://github.com/xiaorouji/openwrt-passwall/archive/refs/heads/main.zip
          unzip -q package/downloads/pw.zip -d package/
          mv package/openwrt-passwall-main package/passwall
          
          # Passwall 依赖包 (使用 main 分支)
          wget -O package/downloads/pw_pkg.zip https://github.com/xiaorouji/openwrt-passwall-packages/archive/refs/heads/main.zip
          unzip -q package/downloads/pw_pkg.zip -d package/
          mv package/openwrt-passwall-packages-main package/passwall_pkgs
          
          # OpenClash (使用 master 分支)
          wget -O package/downloads/oc.zip https://github.com/vernesong/OpenClash/archive/refs/heads/master.zip
          unzip -q package/downloads/oc.zip -d package/
          mv package/OpenClash-master package/openclash

          # 强制安装其余 feeds，忽略冲突
          ./scripts/feeds install -a || true

      - name: 4. 配置注入与 DNS 修复
        run: |
          cd openwrt
          # 直接覆盖注入你的 .config，确保 1024M 分区生效
          cat <<EOT > .config
          CONFIG_TARGET_rockchip=y
          CONFIG_TARGET_rockchip_armv8=y
          CONFIG_TARGET_rockchip_armv8_DEVICE_friendlyarm_nanopi-r2s=y
          CONFIG_TARGET_ROOTFS_PARTSIZE=1024
          CONFIG_PACKAGE_luci-app-openclash=y
          CONFIG_PACKAGE_luci-app-passwall=y
          CONFIG_PACKAGE_luci-app-upnp=y
          CONFIG_PACKAGE_luci-app-cpufreq=y
          CONFIG_PACKAGE_luci-app-ttyd=y
          CONFIG_PACKAGE_luci-app-dockerman=y
          CONFIG_PACKAGE_docker-compose=y
          CONFIG_PACKAGE_bash=y
          CONFIG_PACKAGE_curl=y
          CONFIG_PACKAGE_wget-ssl=y
          CONFIG_PACKAGE_unzip=y
          CONFIG_PACKAGE_tar=y
          CONFIG_PACKAGE_parted=y
          CONFIG_PACKAGE_resize2fs=y
          CONFIG_PACKAGE_fdisk=y
          CONFIG_PACKAGE_e2fsprogs=y
          EOT
          
          # 修复 Passwall 编译必报的 dnsmasq 冲突
          sed -i 's/dnsmasq/dnsmasq-full/g' include/target.mk
          make defconfig

      - name: 5. 编译固件
        run: |
          cd openwrt
          make download -j8
          # 核心步骤，由于配置较多，先尝试多线程，失败则自动转单线程报错
          make -j$(nproc) || make -j1 V=s

      - name: 6. 固件收集
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt_R2S_Final
          path: openwrt/bin/targets/rockchip/armv8/*.img.gz
          
