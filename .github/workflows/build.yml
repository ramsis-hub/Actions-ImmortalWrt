name: 🚀 Build ImmortalWrt (R2S)

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-23.05
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 1. 环境准备
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev swig libpython3-dev
          sudo timedatectl set-timezone "$TZ"

      - name: 2. 克隆源码
        run: git clone $REPO_URL -b $REPO_BRANCH openwrt

      - name: 3. 强制安装插件 (修复权限与依赖)
        run: |
          cd openwrt
          # 更新基础 feeds
          ./scripts/feeds update -a
          
          # 物理注入插件：使用 --depth 1 减少下载量，并确保 URL 正确
          git clone --depth 1 https://github.com/xiaorouji/openwrt-passwall.git package/passwall
          git clone --depth 1 https://github.com/xiaorouji/openwrt-passwall-packages.git package/passwall_pkgs
          git clone --depth 1 https://github.com/vernesong/OpenClash.git package/openclash

          # 自动安装依赖，如果报错则忽略（因为我们已经手动克隆了核心插件）
          ./scripts/feeds install -a || true

      - name: 4. 加载配置与修复 DIY
        run: |
          # 如果仓库有 .config 则使用，没有则生成默认
          [ -f "$GITHUB_WORKSPACE/.config" ] && cp "$GITHUB_WORKSPACE/.config" openwrt/.config
          
          cd openwrt
          # 强制注入 R2S 核心参数，确保固件能启动
          echo "CONFIG_TARGET_rockchip=y" >> .config
          echo "CONFIG_TARGET_rockchip_armv8=y" >> .config
          echo "CONFIG_TARGET_rockchip_armv8_DEVICE_friendlyarm_nanopi-r2s=y" >> .config
          
          # 执行必要的 DIY 修复
          sed -i 's/dnsmasq/dnsmasq-full/g' include/target.mk
          
          make defconfig

      - name: 5. 编译固件
        run: |
          cd openwrt
          make download -j8
          # 首次编译建议使用单线程查看详细错误，但为了速度先尝试多线程
          make -j$(nproc) || make -j1 V=s

      - name: 6. 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt_R2S_Success
          path: openwrt/bin/targets/rockchip/armv8/*.img.gz
