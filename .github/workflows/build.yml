name: 🚀 Build ImmortalWrt (R2S)

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-23.05
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 1. 准备环境与清理磁盘
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev swig libpython3-dev wget
          sudo timedatectl set-timezone "$TZ"
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost

      - name: 2. 克隆源码
        run: git clone $REPO_URL -b $REPO_BRANCH openwrt

      - name: 3. 强制注入插件 (修复 404 与认证问题)
        run: |
          cd openwrt
          # 1. 先添加基本源
          ./scripts/feeds update -a
          
          # 2. 使用绝对可靠的 git 方法，通过指定深度和重试逻辑避开之前的 128 错误
          git clone --depth=1 https://github.com/xiaorouji/openwrt-passwall.git package/passwall
          git clone --depth=1 https://github.com/xiaorouji/openwrt-passwall-packages.git package/passwall_pkgs
          git clone --depth=1 https://github.com/vernesong/OpenClash.git package/openclash

          # 3. 安装所有插件
          ./scripts/feeds install -a || true

      - name: 4. 强制注入你的 .config
        run: |
          cd openwrt
          # 注入你提供的核心配置
          cat <<EOT > .config
          CONFIG_TARGET_rockchip=y
          CONFIG_TARGET_rockchip_armv8=y
          CONFIG_TARGET_rockchip_armv8_DEVICE_friendlyarm_nanopi-r2s=y
          CONFIG_TARGET_ROOTFS_PARTSIZE=1024
          CONFIG_PACKAGE_luci-app-openclash=y
          CONFIG_PACKAGE_luci-app-passwall=y
          CONFIG_PACKAGE_luci-app-upnp=y
          CONFIG_PACKAGE_luci-app-cpufreq=y
          CONFIG_PACKAGE_luci-app-ttyd=y
          CONFIG_PACKAGE_luci-app-dockerman=y
          CONFIG_PACKAGE_docker-compose=y
          CONFIG_PACKAGE_bash=y
          CONFIG_PACKAGE_curl=y
          CONFIG_PACKAGE_wget-ssl=y
          CONFIG_PACKAGE_unzip=y
          CONFIG_PACKAGE_tar=y
          CONFIG_PACKAGE_parted=y
          CONFIG_PACKAGE_resize2fs=y
          CONFIG_PACKAGE_fdisk=y
          CONFIG_PACKAGE_e2fsprogs=y
          EOT
          
          # 修复 DNSMasq 冲突
          sed -i 's/dnsmasq/dnsmasq-full/g' include/target.mk
          
          make defconfig

      - name: 5. 执行编译
        run: |
          cd openwrt
          make download -j8
          make -j$(nproc) || make -j1 V=s

      - name: 6. 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt_R2S_Firmware
          path: openwrt/bin/targets/rockchip/armv8/*.img.gz
