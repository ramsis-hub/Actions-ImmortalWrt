name: 🚀 Build ImmortalWrt (R2S)

on:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection for debugging'
        type: boolean
        default: false

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-23.05
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy1.sh
  DIY_P2_SH: diy2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04 # More stable for older toolchains

    steps:
      - name: 1. Checkout Branch
        uses: actions/checkout@v4

      - name: 2. Initialization Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /usr/share/swift /usr/local/.ghcup /cache /usr/lib/jvm
          sudo apt update
          sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

      - name: 3. Clone Source Code
        working-directory: /workdir
        run: |
          df -hT $PWD
          git clone $REPO_URL -b $REPO_BRANCH openwrt
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

      - name: 4. Cache Dependencies (Speed Up!)
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          key: ${{ runner.os }}-openwrt-dl-${{ hashFiles('**/feeds.conf.default') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-dl-

      - name: 5. Load Custom Feeds & DIY Scripts
        run: |
          cd openwrt
          [ -e $GITHUB_WORKSPACE/$FEEDS_CONF ] && cp $GITHUB_WORKSPACE/$FEEDS_CONF feeds.conf.default
          chmod +x $GITHUB_WORKSPACE/diy*.sh
          $GITHUB_WORKSPACE/diy1.sh
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          $GITHUB_WORKSPACE/diy2.sh

      - name: 6. Load Config & Defconfig
        run: |
          [ -e $CONFIG_FILE ] && cp $CONFIG_FILE openwrt/.config
          cd openwrt
          make defconfig
          # Critical: Check if the config is actually valid for R2S
          grep "CONFIG_TARGET_rockchip=y" .config || (echo "Error: Target not set to Rockchip!" && exit 1)

      - name: 7. SSH Debug (Optional)
        if: github.event.inputs.ssh == 'true'
        uses: mxschmitt/action-tmate@v3

      - name: 8. Download Library & Compile
        id: compile
        run: |
          cd openwrt
          make download -j8
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;
          echo "::group::Build Logs"
          make -j$(nproc) || make -j1 V=s
          echo "::endgroup::"
          echo "status=success" >> $GITHUB_OUTPUT

      - name: 9. Upload Firmware
        if: steps.compile.outputs.status == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt_R2S_Firmware
          path: openwrt/bin/targets/rockchip/armv8/*.img.gz
