name: 🚀 Build ImmortalWrt (R2S)

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-23.05
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 1. 环境准备
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev swig libpython3-dev
          sudo timedatectl set-timezone "$TZ"

      - name: 2. 克隆源码
        run: git clone $REPO_URL -b $REPO_BRANCH openwrt

      - name: 3. 强制安装插件 (手动绕过报错点)
        run: |
          cd openwrt
          # 更新基础 feeds，但排除 passwall
          ./scripts/feeds update -a
          
          # 手动克隆 Passwall 到 package 目录，彻底绕过 feeds 索引错误
          git clone https://github.com/xiaorouji/openwrt-passwall.git package/passwall
          git clone https://github.com/xiaorouji/openwrt-passwall-packages.git package/passwall_pkgs
          git clone https://github.com/vernesong/OpenClash.git package/openclash

          # 安装其余正常的 feeds
          ./scripts/feeds install -a

      - name: 4. 加载配置
        run: |
          [ -e .config ] && cp .config openwrt/.config
          cd openwrt
          # 强制写入 R2S 核心参数
          echo "CONFIG_TARGET_rockchip=y" >> .config
          echo "CONFIG_TARGET_rockchip_armv8=y" >> .config
          echo "CONFIG_TARGET_rockchip_armv8_DEVICE_friendlyarm_nanopi-r2s=y" >> .config
          make defconfig

      - name: 5. 编译固件
        run: |
          cd openwrt
          make download -j8
          make -j$(nproc) || make -j1 V=s

      - name: 6. 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt_R2S_Fixed
          path: openwrt/bin/targets/rockchip/armv8/*.img.gz
