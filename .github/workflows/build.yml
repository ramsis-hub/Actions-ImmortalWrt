name: 🚀 Build ImmortalWrt (R2S)

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-23.05
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 1. Setup Environment
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev swig libpython3-dev wget
          sudo timedatectl set-timezone "$TZ"

      - name: 2. Clone Source
        run: git clone $REPO_URL -b $REPO_BRANCH openwrt

      - name: 3. Force Inject Plugins (No-Git Method)
        run: |
          cd openwrt
          ./scripts/feeds update -a
          
          # Download Passwall and OpenClash as ZIPs to bypass Git Auth errors
          mkdir -p package/downloads
          
          wget https://github.com/xiaorouji/openwrt-passwall/archive/refs/heads/main.zip -O package/downloads/passwall.zip
          unzip package/downloads/passwall.zip -d package/
          mv package/openwrt-passwall-main package/passwall
          
          wget https://github.com/xiaorouji/openwrt-passwall-packages/archive/refs/heads/main.zip -O package/downloads/passwall_pkgs.zip
          unzip package/downloads/passwall_pkgs.zip -d package/
          mv package/openwrt-passwall-packages-main package/passwall_pkgs
          
          wget https://github.com/vernesong/OpenClash/archive/refs/heads/master.zip -O package/downloads/openclash.zip
          unzip package/downloads/openclash.zip -d package/
          mv package/OpenClash-master package/openclash

          ./scripts/feeds install -a || true

      - name: 4. Finalize Configuration
        run: |
          [ -f ".config" ] && cp ".config" openwrt/.config
          cd openwrt
          echo "CONFIG_TARGET_rockchip=y" >> .config
          echo "CONFIG_TARGET_rockchip_armv8=y" >> .config
          echo "CONFIG_TARGET_rockchip_armv8_DEVICE_friendlyarm_nanopi-r2s=y" >> .config
          
          # Fix common conflicts
          sed -i 's/dnsmasq/dnsmasq-full/g' include/target.mk
          
          make defconfig

      - name: 5. Start Compilation
        run: |
          cd openwrt
          make download -j8
          make -j$(nproc) || make -j1 V=s

      - name: 6. Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt_R2S_Final
          path: openwrt/bin/targets/rockchip/armv8/*.img.gz
