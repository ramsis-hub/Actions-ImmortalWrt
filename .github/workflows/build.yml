name: 🚀 Build ImmortalWrt (R2S)

on:
  workflow_dispatch:
    inputs:
      ssh:
        description: '开启 SSH 远程调试'
        type: boolean
        default: false

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-23.05
  CONFIG_FILE: .config
  DIY_SH: diy.sh
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 1. 检出仓库
        uses: actions/checkout@v4

      - name: 2. 安装环境
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt update
          sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
          sudo timedatectl set-timezone "$TZ"

      - name: 3. 克隆源码
        run: |
          git clone $REPO_URL -b $REPO_BRANCH openwrt
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

      - name: 4. 缓存加速
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          key: ${{ runner.os }}-openwrt-dl-${{ hashFiles('**/feeds.conf.default') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-dl-

      - name: 5. 加载插件源与 DIY 脚本
        run: |
          # 如果仓库里有 feeds 文件且不是空的，则使用它
          if [ -s feeds.conf.default ]; then
            cp feeds.conf.default openwrt/feeds.conf.default
          fi
          
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
          # 执行 diy.sh
          if [ -f "$GITHUB_WORKSPACE/$DIY_SH" ]; then
            chmod +x $GITHUB_WORKSPACE/$DIY_SH
            $GITHUB_WORKSPACE/$DIY_SH
          fi

      - name: 6. 检查配置
        run: |
          [ -e $CONFIG_FILE ] && cp $CONFIG_FILE openwrt/.config
          cd openwrt
          # 强制注入 R2S 架构，防止 .config 配置丢失
          sed -i 's/CONFIG_TARGET_rockchip=y/CONFIG_TARGET_rockchip=y/' .config || echo "CONFIG_TARGET_rockchip=y" >> .config
          echo "CONFIG_TARGET_rockchip_armv8=y" >> .config
          echo "CONFIG_TARGET_rockchip_armv8_DEVICE_friendlyarm_nanopi-r2s=y" >> .config
          
          make defconfig

      - name: 7. SSH 调试 (手动开启)
        if: github.event.inputs.ssh == 'true'
        uses: mxschmitt/action-tmate@v3

      - name: 8. 下载编译
        id: compile
        run: |
          cd openwrt
          make download -j8
          make -j$(nproc) || make -j1 V=s
          echo "status=success" >> $GITHUB_OUTPUT

      - name: 9. 上传固件
        if: steps.compile.outputs.status == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt_R2S_Firmware
          path: openwrt/bin/targets/rockchip/armv8/*.img.gz
