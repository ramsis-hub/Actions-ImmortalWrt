name: 🚀 编译 (Build)

on:
  workflow_dispatch:
    inputs:
      owner:
        description: 'ImmortalWrt 仓库的拥有者'
        type: string
        required: true
        default: 'immortalwrt'
      repo:
        description: 'ImmortalWrt 仓库的名字'
        type: string
        required: true
        default: 'immortalwrt'
      branch:
        description: 'ImmortalWrt 仓库的分支 (R2S 建议使用 openwrt-23.05 或 master)'
        type: string
        required: true
        default: 'openwrt-23.05'
      multithreading:
        description: '开启多线程编译'
        type: boolean
        default: true
      ssh:
        description: '使用 ssh 连接到编译环境'
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    name: 🚀 编译 (Build)
    steps:
      - name: 下载编译所需的依赖
        run: |
          sudo apt update
          sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev

      - name: 克隆当前仓库
        uses: actions/checkout@v4

      - name: 克隆 ImmortalWrt 仓库
        uses: actions/checkout@v4
        with:
          repository: '${{ github.event.inputs.owner }}/${{ github.event.inputs.repo }}'
          ref: ${{ github.event.inputs.branch }}
          path: ImmortalWrt

      - name: 运行 diy.sh
        working-directory: ImmortalWrt
        run: |
          cp -f ../diy.sh .
          chmod +x diy.sh
          ./diy.sh

      - name: 更新并下载 feeds
        working-directory: ImmortalWrt
        run: |
          cp -f ../feeds.conf.default . || true
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 复制 .config 配置文件
        run: cp -f .config ImmortalWrt/.config

      - name: 编译前生成配置 (Make defconfig)
        working-directory: ImmortalWrt
        run: make defconfig

      - name: 编译前上传配置 (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: config-before-build
          path: ImmortalWrt/.config

      - name: 开启 SSH 远程调试 (可选)
        if: ${{ github.event.inputs.ssh == 'true' }}
        uses: lhotari/action-upterm@v1
        with:
          wait-timeout-minutes: 30

      - name: 多线程编译
        if: ${{ github.event.inputs.multithreading == 'true' }}
        working-directory: ImmortalWrt
        run: |
          echo "Starting multithreaded build..."
          make -j$(nproc) || make -j1 V=s
        # Note: If -j$(nproc) fails, it automatically retries with -j1 V=s to show the error.

      - name: 单线程编译
        if: ${{ github.event.inputs.multithreading == 'false' }}
        working-directory: ImmortalWrt
        run: make -j1 V=s

      - name: 上传编译结果到 Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-R2S-Build
          path: ImmortalWrt/bin/targets/rockchip/armv8/*.img.gz
          
